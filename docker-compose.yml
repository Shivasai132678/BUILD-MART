version: "3.9"
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: buildmart
      POSTGRES_PASSWORD: buildmart
      POSTGRES_DB: buildmart_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
  backend:
    build: ./apps/backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    depends_on:
      - db
    env_file: ./apps/backend/.env
volumes:
  pgdata:
