name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: buildmart
          POSTGRES_PASSWORD: buildmart
          POSTGRES_DB: buildmart_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://buildmart:buildmart@localhost:5432/buildmart_dev?connection_limit=5&pool_timeout=10
      DIRECT_URL: postgresql://buildmart:buildmart@localhost:5432/buildmart_dev
      JWT_SECRET: ci-test-secret
      JWT_EXPIRES_IN: 7d
      NODE_ENV: test
      FRONTEND_URL: http://localhost:3000
      PORT: 3001

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Frontend typecheck
        run: cd apps/frontend && pnpm typecheck

      - name: Lint backend
        run: cd apps/backend && pnpm lint

      - name: Lint frontend
        run: cd apps/frontend && pnpm lint

      - name: Security lint backend
        run: cd apps/backend && pnpm lint:security

      - name: Security lint frontend
        run: cd apps/frontend && pnpm lint:security

      - name: Run Prisma migrations (deploy — no shadow DB)
        run: cd apps/backend && npx prisma migrate deploy
        # Rule 21: NEVER use migrate dev in CI. Always migrate deploy.

      - name: Build backend
        run: cd apps/backend && pnpm build

      - name: Verify OpenAPI spec is up-to-date
        run: cd apps/backend && pnpm docs:openapi:check

      - name: Build frontend
        run: cd apps/frontend && pnpm build

      - name: Run backend tests
        run: cd apps/backend && pnpm test
        # If no test files exist yet this step will pass (jest returns 0 on no tests)

      - name: Run auth CSRF e2e test
        run: cd apps/backend && RUN_E2E_TESTS=true pnpm exec jest --config ./test/jest-e2e.json --runInBand --forceExit test/auth-csrf.e2e-spec.ts

      - name: Dependency vulnerability gate (moderate+)
        run: cd apps/backend && pnpm audit:production
