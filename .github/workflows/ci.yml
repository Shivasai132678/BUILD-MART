name: CI

on:
  push:
    branches: [develop]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: buildmart
          POSTGRES_PASSWORD: buildmart
          POSTGRES_DB: buildmart_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://buildmart:buildmart@localhost:5432/buildmart_dev?connection_limit=5&pool_timeout=10
      DIRECT_URL: postgresql://buildmart:buildmart@localhost:5432/buildmart_dev
      JWT_SECRET: ci-test-secret
      JWT_EXPIRES_IN: 7d
      NODE_ENV: test
      FRONTEND_URL: http://localhost:3000
      PORT: 3001

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint backend
        run: cd apps/backend && pnpm lint

      - name: Lint frontend
        run: cd apps/frontend && pnpm lint

      - name: Run Prisma migrations (deploy — no shadow DB)
        run: cd apps/backend && npx prisma migrate deploy
        # Rule 21: NEVER use migrate dev in CI. Always migrate deploy.

      - name: Build backend
        run: cd apps/backend && pnpm build

      - name: Build frontend
        run: cd apps/frontend && pnpm build

      - name: Run backend tests
        run: cd apps/backend && pnpm test
        # If no test files exist yet this step will pass (jest returns 0 on no tests)
